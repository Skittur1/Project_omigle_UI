<nav class="fixed top-0 left-0 right-0 z-50 border-b border-white/10 bg-[#0a0b1a]/90 backdrop-blur-md">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="#" class="flex items-center gap-2">

        <div
          class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-blue-500 flex items-center justify-center">

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-5 h-5 text-white"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            <path d="M2 12h20"></path>

          </svg>

        </div>

        <span class="text-white font-bold text-xl tracking-tight">
          omilge
        </span>

      </a>

      <!-- Desktop Links -->
      <div class="hidden md:flex items-center gap-6">

        @for (link of data.navLinks; track link.label) {

          <a
            [href]="link.href"
            class="text-sm text-gray-300 hover:text-white transition-colors duration-200 font-medium">

            {{ link.label }}

          </a>

        }

      </div>

      <!-- Desktop Actions -->
      <div class="hidden md:flex items-center gap-3">

        <button
          class="flex items-center gap-1 text-sm text-gray-300 hover:text-white transition-colors">

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-4 h-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <circle cx="12" cy="12" r="10"></circle>
            <path d="M2 12h20"></path>

          </svg>

          <span>English</span>

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-3 h-3"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <polyline points="6 9 12 15 18 9"></polyline>

          </svg>

        </button>

        <button
          class="px-4 py-2 text-sm text-white border border-white/20 rounded-lg hover:bg-white/10 transition-colors">

          Sign In

        </button>

        <button
          class="px-4 py-2 text-sm text-white bg-gradient-to-r from-violet-600 to-blue-600 rounded-lg hover:from-violet-500 hover:to-blue-500 transition-all duration-200 font-medium">

          Sign Up

        </button>

      </div>

      <!-- Mobile Toggle -->
      <button
        class="md:hidden text-gray-300 hover:text-white"
        (click)="toggleMenu()">

        @if (menuOpen) {

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>

          </svg>

        } @else {

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>

          </svg>

        }

      </button>

    </div>

  </div>

  <!-- Mobile Menu -->

  @if (menuOpen) {

    <div
      class="md:hidden bg-[#0d0e1f] border-t border-white/10 px-4 pb-4">

      @for (link of data.navLinks; track link.label) {

        <a
          [href]="link.href"
          (click)="closeMenu()"
          class="block py-3 text-sm text-gray-300 hover:text-white border-b border-white/5 transition-colors">

          {{ link.label }}

        </a>

      }

      <div class="flex gap-3 mt-4">

        <button
          class="flex-1 py-2 text-sm text-white border border-white/20 rounded-lg hover:bg-white/10">

          Sign In

        </button>

        <button
          class="flex-1 py-2 text-sm text-white bg-gradient-to-r from-violet-600 to-blue-600 rounded-lg font-medium">

          Sign Up

        </button>

      </div>

    </div>

  }

</nav>

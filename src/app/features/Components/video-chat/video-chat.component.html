<div class="min-h-screen bg-gray-900 p-4">
  <!-- Status -->
  <div class="flex justify-between bg-gray-800 p-3 rounded mb-4">
    <span class="text-white">{{ connectionStatus }}</span>
    <span class="text-white">{{ userName || 'Guest' }}</span>
  </div>

  <!-- Error -->
  <div *ngIf="errorMessage" class="bg-red-500/20 text-red-400 p-3 rounded mb-4">
    {{ errorMessage }}
  </div>

  <!-- Start Screen -->
  <div *ngIf="!isInCall && !isConnecting" class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-gray-800 p-8 rounded max-w-md w-full">
      <h2 class="text-2xl text-white text-center mb-6">Video Chat</h2>
      <input 
        type="text"
        [(ngModel)]="userName"
        placeholder="Your name"
        class="w-full p-2 bg-gray-700 text-white rounded mb-4"
        (keyup.enter)="startVideoChat()">
      <button 
        (click)="startVideoChat()"
        class="w-full p-3 bg-blue-600 hover:bg-blue-700 text-white rounded">
        Start
      </button>
    </div>
  </div>

  <!-- Connecting -->
  <div *ngIf="isConnecting && !isInCall" class="flex items-center justify-center min-h-[60vh]">
    <div class="text-center text-white">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
      <p>Finding partner...</p>
    </div>
  </div>

  <!-- Call Screen -->
  <div *ngIf="isInCall" class="max-w-4xl mx-auto">
    <!-- Videos -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="relative bg-gray-800 rounded overflow-hidden aspect-video">
        <video #localVideo autoplay muted playsinline class="w-full h-full object-cover"></video>
        <span class="absolute bottom-2 left-2 bg-black/50 text-white text-xs px-2 py-1 rounded">You</span>
      </div>
      <div class="relative bg-gray-800 rounded overflow-hidden aspect-video">
        <video #remoteVideo autoplay playsinline class="w-full h-full object-cover"></video>
        <span class="absolute bottom-2 left-2 bg-black/50 text-white text-xs px-2 py-1 rounded">Partner</span>
        <div *ngIf="!remoteVideo.srcObject" class="absolute inset-0 flex items-center justify-center text-gray-500">
          Waiting...
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="flex justify-center gap-3">
      <button (click)="toggleVideo()" 
        class="p-3 rounded-full" 
        [class.bg-gray-700]="isVideoEnabled" 
        [class.bg-red-600]="!isVideoEnabled">
        <span class="text-white">{{ isVideoEnabled ? '📹' : '🚫' }}</span>
      </button>

      <button (click)="toggleAudio()" 
        class="p-3 rounded-full" 
        [class.bg-gray-700]="isAudioEnabled" 
        [class.bg-red-600]="!isAudioEnabled">
        <span class="text-white">{{ isAudioEnabled ? '🎤' : '🔇' }}</span>
      </button>

      <button (click)="skipPartner()" class="p-3 rounded-full bg-yellow-600 hover:bg-yellow-700">
        <span class="text-white">⏭️</span>
      </button>

      <button (click)="endCall()" class="p-3 rounded-full bg-red-600 hover:bg-red-700">
        <span class="text-white">📞</span>
      </button>
    </div>
  </div>
</div>

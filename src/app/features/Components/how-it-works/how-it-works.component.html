<section id="how-it-works" class="py-20 bg-[#0a0b1a]">

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="flex items-center gap-2 mb-8">
      <span class="text-xl">⚡</span>
      <h2 class="text-2xl font-bold text-white">
        How It Works
      </h2>
    </div>

    <div class="grid sm:grid-cols-3 gap-6">

      @for (step of data.steps; track step.number; let last = $last) {

        <div
          class="bg-[#12132a] border border-white/10 rounded-2xl p-6 hover:border-violet-500/40 transition-colors duration-300">

          <!-- Step Number -->
          <div class="flex items-center gap-3 mb-4">

            <span
              class="w-8 h-8 rounded-full bg-gradient-to-br from-violet-600 to-blue-600 flex items-center justify-center text-white text-sm font-bold">

              {{ step.number }}

            </span>

            @if (!last) {
              <div
                class="flex-1 h-px bg-gradient-to-r from-violet-500/40 to-transparent hidden sm:block">
              </div>
            }

          </div>

          <!-- Icon -->
          <div
            class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center mb-4">

            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-6 h-6 text-violet-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2">

              @switch (step.icon) {
                @case ('users') {
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                  <circle cx="9" cy="7" r="4" />
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                  <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                }

                @case ('message-square') {
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                }

              }

            </svg>

          </div>

          <!-- Title -->
          <h3 class="text-white font-semibold mb-2">
            {{ step.title }}
          </h3>

          <!-- Description -->
          <p class="text-gray-400 text-sm leading-relaxed">
            {{ step.description }}
          </p>

        </div>

      }

    </div>

  </div>

</section>

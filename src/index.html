<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

@tailwind base;
@tailwind components;
@tailwind utilities;

@layer base {
  * {
    box-sizing: border-box;
  }
  html {
    scroll-behavior: smooth;
  }
  body {
    font-family: 'Inter', sans-serif;
    background-color: #0a0b1a;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }
}

@layer components {
  .navbar-root {
    background: rgba(10, 11, 26, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .hero-section {
    background: #0a0b1a;
  }

  .hero-bg-glow {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background:
      radial-gradient(ellipse 60% 50% at 70% 40%, rgba(109, 40, 217, 0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 30% 60%, rgba(37, 99, 235, 0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-gradient-text {
    background: linear-gradient(135deg, #7c3aed 0%, #3b82f6 50%, #06b6d4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .globe-sphere {
    position: absolute;
    inset: 5%;
    border-radius: 50%;
    background:
      radial-gradient(circle at 35% 35%, rgba(139, 92, 246, 0.5) 0%, rgba(59, 130, 246, 0.3) 40%, rgba(6, 182, 212, 0.15) 70%, transparent 100%);
    box-shadow:
      0 0 80px 20px rgba(109, 40, 217, 0.25),
      inset 0 0 60px rgba(109, 40, 217, 0.15);
    animation: globe-pulse 4s ease-in-out infinite;
  }

  .globe-sphere::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(139, 92, 246, 0.3);
    background-image:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 18px,
        rgba(139, 92, 246, 0.08) 18px,
        rgba(139, 92, 246, 0.08) 19px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 18px,
        rgba(139, 92, 246, 0.08) 18px,
        rgba(139, 92, 246, 0.08) 19px
      );
  }
}

@layer utilities {
  @keyframes globe-pulse {
    0%, 100% {
      box-shadow:
        0 0 80px 20px rgba(109, 40, 217, 0.25),
        inset 0 0 60px rgba(109, 40, 217, 0.15);
    }
    50% {
      box-shadow:
        0 0 120px 30px rgba(109, 40, 217, 0.35),
        inset 0 0 80px rgba(109, 40, 217, 0.2);
    }
  }
}

</style>
